<script type="module">
// ═══════════════════════════════════════════════════════════
// AUTH MODULE
// ═══════════════════════════════════════════════════════════
const Auth = {
  getToken: () => localStorage.getItem('partype_token'),
  getUser: () => { try { return JSON.parse(localStorage.getItem('partype_user') || 'null'); } catch { return null; } },
  setAuth: (token, user) => { localStorage.setItem('partype_token', token); localStorage.setItem('partype_user', JSON.stringify(user)); },
  clearAuth: () => { localStorage.removeItem('partype_token'); localStorage.removeItem('partype_user'); },
  isLoggedIn: () => !!localStorage.getItem('partype_token'),
};

// ═══════════════════════════════════════════════════════════
// API MODULE
// ═══════════════════════════════════════════════════════════
const API = {
  base: '/api',
  headers() {
    const h = { 'Content-Type': 'application/json' };
    const token = Auth.getToken();
    if (token) h['Authorization'] = `Bearer ${token}`;
    return h;
  },
  async get(path) {
    const r = await fetch(this.base + path, { headers: this.headers() });
    if (!r.ok) throw new Error((await r.json()).detail || r.statusText);
    return r.json();
  },
  async post(path, body) {
    const r = await fetch(this.base + path, { method: 'POST', headers: this.headers(), body: JSON.stringify(body) });
    if (!r.ok) throw new Error((await r.json()).detail || r.statusText);
    return r.json();
  },
  async patch(path, body) {
    const r = await fetch(this.base + path, { method: 'PATCH', headers: this.headers(), body: JSON.stringify(body) });
    if (!r.ok) throw new Error((await r.json()).detail || r.statusText);
    return r.json();
  },
};

// ═══════════════════════════════════════════════════════════
// STATE MODULE
// ═══════════════════════════════════════════════════════════
const State = {
  cart: [],
  currentSession: null,
  addToCart(item) {
    const existing = this.cart.find(i => i.id === item.id);
    if (existing) existing.qty++;
    else this.cart.push({ ...item, qty: 1 });
    Toast.show(`${item.name} added to cart 🛒`, 'success');
    this.renderCartBadge();
  },
  removeFromCart(itemId) {
    const idx = this.cart.findIndex(i => i.id === itemId);
    if (idx > -1) {
      if (this.cart[idx].qty > 1) this.cart[idx].qty--;
      else this.cart.splice(idx, 1);
    }
    this.renderCartBadge();
  },
  clearCart() { this.cart = []; this.renderCartBadge(); },
  cartTotal() { return this.cart.reduce((s, i) => s + i.price * i.qty, 0); },
  cartCount() { return this.cart.reduce((s, i) => s + i.qty, 0); },
  renderCartBadge() {
    document.querySelectorAll('.cart-badge').forEach(el => {
      const count = this.cartCount();
      el.textContent = count;
      el.style.display = count > 0 ? 'flex' : 'none';
    });
  }
};

// ═══════════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════════
const Toast = {
  show(msg, type = 'info') {
    const el = document.createElement('div');
    const colors = { success: 'bg-success-teal text-white', error: 'bg-error text-white', info: 'bg-inverse-surface text-inverse-on-surface' };
    el.className = `toast ${colors[type] || colors.info}`;
    el.textContent = msg;
    document.getElementById('toast-container').appendChild(el);
    setTimeout(() => el.remove(), 3000);
  }
};

// ═══════════════════════════════════════════════════════════
// ROUTER
// ═══════════════════════════════════════════════════════════
const Router = {
  routes: {},
  register(path, handler) { this.routes[path] = handler; },
  navigate(path, replace = false) {
    if (replace) history.replaceState(null, '', '#' + path);
    else history.pushState(null, '', '#' + path);
    this.render();
  },
  currentPath() {
    const hash = location.hash.replace('#', '') || '/';
    return hash.split('?')[0];
  },
  currentParams() {
    const hash = location.hash.replace('#', '');
    const q = hash.split('?')[1];
    if (!q) return {};
    return Object.fromEntries(new URLSearchParams(q));
  },
  async render() {
    const path = this.currentPath();
    const root = document.getElementById('app-root');
    // Find matching route (support dynamic segments like /restaurant/:id)
    let handler = null;
    let params = {};
    for (const [pattern, h] of Object.entries(this.routes)) {
      const match = this.matchPath(pattern, path);
      if (match !== null) { handler = h; params = match; break; }
    }
    if (!handler) {
      root.innerHTML = `<div class="flex flex-col items-center justify-center min-h-screen gap-4"><h1 class="text-4xl font-bold text-primary">404</h1><p class="text-on-surface-variant">Page not found</p><button onclick="Router.navigate('/')" class="bg-primary text-white px-6 py-3 rounded-xl">Go Home</button></div>`;
      return;
    }
    try {
      const html = await handler(params, this.currentParams());
      root.innerHTML = `<div class="page-enter">${html}</div>`;
      // Re-run page scripts
      const scripts = root.querySelectorAll('script');
      scripts.forEach(s => { const ns = document.createElement('script'); ns.textContent = s.textContent; s.parentNode.replaceChild(ns, s); });
      State.renderCartBadge();
      updateNavHighlight();
    } catch(e) {
      console.error(e);
      root.innerHTML = `<div class="flex items-center justify-center min-h-screen"><p class="text-error">Error loading page: ${e.message}</p></div>`;
    }
  },
  matchPath(pattern, path) {
    const pParts = pattern.split('/');
    const rParts = path.split('/');
    if (pParts.length !== rParts.length) return null;
    const params = {};
    for (let i = 0; i < pParts.length; i++) {
      if (pParts[i].startsWith(':')) params[pParts[i].slice(1)] = rParts[i];
      else if (pParts[i] !== rParts[i]) return null;
    }
    return params;
  },
  init() {
    window.addEventListener('popstate', () => this.render());
    this.render();
  }
};
window.Router = Router;
window.Auth = Auth;
window.API = API;
window.State = State;
window.Toast = Toast;

        <div class="absolute top-3 right-3 bg-surface-container-lowest/90 backdrop-blur px-2 py-1 rounded-lg flex items-center gap-1 shadow-sm">

          <button class="w-full py-unit-1 bg-primary text-on-primary rounded-lg font-label-md text-label-md hover:opacity-90 transition-opacity" onclick="event.stopPropagation(); Router.navigate('/restaurant/${r.id}')">View Menu</button>
        </div>
      </div>
    </div>
  `).join('');

  return `
    ${navBar('explore')}
    <main class="max-w-[1140px] mx-auto px-margin-mobile md:px-margin-desktop pt-unit-4 pb-[100px]">
      <section class="mb-unit-4">
        <h1 class="font-headline-lg text-headline-lg text-primary mb-unit-2">Discover Restaurants</h1>
        <div class="flex flex-col gap-unit-3">

            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">search</span>
            <input id="search-input" class="w-full pl-12 pr-4 py-3 bg-surface-container-lowest border border-outline-variant rounded-xl focus:ring-2 focus:ring-primary focus:border-primary transition-all font-body-md shadow-sm outline-none" placeholder="Search cuisines, restaurants, or dishes..." type="text"/>

          <div class="flex items-center gap-unit-2 overflow-x-auto hide-scrollbar pb-2">

            ${['Modern Indian','Farm-to-Table','Japanese','Mediterranean','American BBQ','Italian'].map(c => `<button class="filter-btn bg-surface-container-lowest border border-outline-variant text-on-surface-variant px-4 py-2 rounded-full font-label-md shrink-0 hover:border-primary hover:text-primary transition-all" data-filter="${c}">${c}</button>`).join('')}
          </div>

        ${cards || '<p class="text-on-surface-variant col-span-3 text-center py-12">Loading restaurants...</p>'}
      </div>
    </main>
    ${footer()}
    ${bottomNav('explore')}
    <script>
      const allRestaurants = ${JSON.stringify(restaurants)};
      function renderGrid(list) {
        const grid = document.getElementById('restaurants-grid');
        if (!list.length) { grid.innerHTML = '<p class="text-on-surface-variant col-span-3 text-center py-12">No restaurants found</p>'; return; }
        grid.innerHTML = list.map(r => \`
          <div class="group bg-surface-container-lowest rounded-xl overflow-hidden shadow-[0_4px_12px_rgba(0,0,0,0.08)] hover:shadow-[0_8px_24px_rgba(0,0,0,0.12)] transition-all flex flex-col cursor-pointer hover:-translate-y-1" onclick="Router.navigate('/restaurant/\${r.id}')">
            <div class="relative h-48 overflow-hidden">
              <img class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" src="\${r.image_url || 'https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=400'}" alt="\${r.name}" onerror="this.src='https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=400'"/>
              <div class="absolute top-3 right-3 bg-surface-container-lowest/90 backdrop-blur px-2 py-1 rounded-lg flex items-center gap-1 shadow-sm">
                <span class="material-symbols-outlined text-[16px] text-celebration-coral" style="font-variation-settings:'FILL' 1">star</span>
                <span class="font-label-sm text-label-sm">\${r.rating}</span>
              </div>
            </div>
            <div class="p-unit-2 flex flex-col flex-grow">
              <div class="flex justify-between items-start mb-1"><h3 class="font-title-md text-title-md">\${r.name}</h3><span class="font-label-sm text-label-sm text-on-surface-variant">\${r.price_range}</span></div>
              <p class="font-body-md text-body-md text-on-surface-variant mb-unit-3">\${r.cuisine_type}</p>
              <div class="mt-auto"><button class="w-full py-unit-1 bg-primary text-on-primary rounded-lg font-label-md hover:opacity-90 transition-opacity" onclick="event.stopPropagation(); Router.navigate('/restaurant/\${r.id}')">View Menu</button></div>
            </div>
          </div>\`).join('');
      }
      document.getElementById('search-input').addEventListener('input', (e) => {
        const q = e.target.value.toLowerCase();
        renderGrid(allRestaurants.filter(r => r.name.toLowerCase().includes(q) || r.cuisine_type.toLowerCase().includes(q)));
      });
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.filter-btn').forEach(b => { b.className = 'filter-btn bg-surface-container-lowest border border-outline-variant text-on-surface-variant px-4 py-2 rounded-full font-label-md shrink-0 hover:border-primary hover:text-primary transition-all'; });
          btn.className = 'filter-btn bg-primary text-on-primary px-4 py-2 rounded-full font-label-md shrink-0';
          const filter = btn.dataset.filter;
          renderGrid(filter === 'all' ? allRestaurants : allRestaurants.filter(r => r.cuisine_type === filter));
        });
      });
    <\/script>
  `;
});

      });
    <\/script>

});

      </div>
      ${!user ? `<p class="text-on-surface-variant font-label-sm mb-3">You'll need to <a onclick="Router.navigate('/signin')" class="text-primary cursor-pointer underline">sign in</a> to join</p>` : ''}

      function nextFocus(el, i) { el.value = el.value.toUpperCase(); if (el.value && i < 6) document.getElementById('code-' + (i+1))?.focus(); }
      function prevFocus(e, i) { if (e.key === 'Backspace' && !e.target.value && i > 1) document.getElementById('code-' + (i-1))?.focus(); }
      document.getElementById('join-btn').addEventListener('click', async () => {
        const code = [1,2,3,4,5,6].map(i => document.getElementById('code-' + i).value).join('').toUpperCase();

          const sess = await API.post('/sessions/join/' + code, {});
          State.currentSession = sess;
          Toast.show('Joined session! 🎉', 'success');
          Router.navigate('/session/live?code=' + code, true);
        } catch(e) { Toast.show('Could not join: ' + e.message, 'error'); }
      });
    <\/script>
  `;
});

          </div>
        `).join('')}
      </div>
    </main>
    <div id="table-modal" class="hidden fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-black/50">
      <div class="bg-surface-container-lowest rounded-t-3xl sm:rounded-3xl w-full max-w-sm p-unit-4 shadow-2xl">
        <h3 id="modal-title" class="font-headline-lg-mobile text-primary mb-unit-3">Table T01</h3>
        <p id="modal-status" class="font-label-md text-on-surface-variant mb-unit-3">Status: Occupied</p>
        <div class="grid grid-cols-2 gap-2 mb-unit-3">
          <button onclick="setTableStatus('available')" class="py-3 bg-success-teal/10 text-success-teal rounded-xl font-bold hover:bg-success-teal/20 transition-colors">Set Available</button>
          <button onclick="setTableStatus('occupied')" class="py-3 bg-celebration-coral/10 text-celebration-coral rounded-xl font-bold hover:bg-celebration-coral/20 transition-colors">Set Occupied</button>
          <button onclick="setTableStatus('reserved')" class="py-3 bg-primary-fixed text-primary rounded-xl font-bold hover:bg-primary-fixed/70 transition-colors">Set Reserved</button>
          <button onclick="setTableStatus('billing')" class="py-3 bg-primary/10 text-primary rounded-xl font-bold hover:bg-primary/20 transition-colors">Set Billing</button>
        </div>
        <button onclick="document.getElementById('table-modal').classList.add('hidden')" class="w-full py-3 border border-outline-variant rounded-xl font-label-md hover:bg-surface-container-high transition-colors">Close</button>
      </div>
    </div>
    ${bottomNav()}
    <script>
      let currentTableId = null;
      function showTableModal(id, num, status) {
        currentTableId = id;
        document.getElementById('modal-title').textContent = 'Table ' + num;
        document.getElementById('modal-status').textContent = 'Status: ' + status.charAt(0).toUpperCase() + status.slice(1);
        document.getElementById('table-modal').classList.remove('hidden');
      }
      async function setTableStatus(status) {
        if (!currentTableId) return;
        try {
          await API.patch('/merchant/tables/' + currentTableId + '/status', { status });
          Toast.show('Table updated to ' + status, 'success');
          document.getElementById('table-modal').classList.add('hidden');
          setTimeout(() => Router.navigate('/merchant/tables', true), 500);

      }
      document.querySelectorAll('.tab-btn').forEach(btn => {

          const filter = btn.dataset.status;
          document.querySelectorAll('.table-card').forEach(card => { card.style.display = (filter === 'all' || card.dataset.status === filter) ? '' : 'none'; });
        });
      });
    <\/script>
  `;
});

      <main class="px-margin-mobile pb-[100px] pt-4">

});

Router.register('/waiter/order', async () => {
  let menu = [];
  try { menu = await API.get('/restaurants/1/menu'); } catch(e) {}
  const cats = [...new Set(menu.map(i => i.category))];
  return `

      <div class="flex items-center gap-3 mb-unit-4">

      </div>
      <div class="bg-surface-container-lowest rounded-2xl border border-outline-variant p-unit-3 mb-unit-3">
        <div class="grid grid-cols-2 gap-3">
          <div><label class="font-label-md text-on-surface-variant block mb-1">Customer Name</label><input type="text" id="w-name" placeholder="Guest Name" class="w-full h-11 px-unit-2 rounded-lg border border-outline-variant bg-surface font-body-md focus:border-primary outline-none"/></div>
          <div><label class="font-label-md text-on-surface-variant block mb-1">Table Number</label><input type="text" id="w-table" placeholder="T01" class="w-full h-11 px-unit-2 rounded-lg border border-outline-variant bg-surface font-body-md focus:border-primary outline-none"/></div>
        </div>
      </div>
      ${cats.map(cat => `
        <div class="mb-unit-3">
          <h3 class="font-label-md text-on-surface-variant uppercase tracking-wider mb-2">${cat}</h3>
          <div class="space-y-2">
            ${menu.filter(i => i.category === cat).map(item => `
              <div class="flex items-center justify-between p-unit-2 bg-surface-container-lowest rounded-xl border border-outline-variant">
                <div><p class="font-label-md font-bold">${item.name}</p><p class="font-label-sm text-primary">₹${item.price}</p></div>
                <button onclick="State.addToCart({id:${item.id},name:'${item.name.replace(/'/g,'\\'')}',price:${item.price}})" class="w-9 h-9 bg-primary text-white rounded-xl flex items-center justify-center active:scale-90 transition-transform"><span class="material-symbols-outlined text-[18px]">add</span></button>
              </div>
            `).join('')}
          </div>
        </div>
      `).join('')}
      <div class="fixed bottom-0 left-0 right-0 bg-surface border-t border-outline-variant p-4 flex gap-3 z-40">
        <div class="flex-1 bg-surface-container-lowest rounded-xl p-3 border border-outline-variant">
          <p class="font-label-sm text-on-surface-variant">Cart Total</p>
          <p class="font-title-md text-primary">₹<span id="w-total">0</span> · <span class="cart-badge" id="w-count">0</span> items</p>
        </div>
        <button onclick="submitWaiterOrder()" class="bg-primary text-white px-6 rounded-xl font-title-md hover:opacity-90 transition-opacity">Place Order</button>
      </div>
    </main>
    <script>
      function updateWaiterTotal() { document.getElementById('w-total').textContent = State.cartTotal().toFixed(0); document.getElementById('w-count').textContent = State.cartCount(); }
      const origAdd = State.addToCart.bind(State); State.addToCart = function(item) { origAdd(item); updateWaiterTotal(); };
      updateWaiterTotal();
      async function submitWaiterOrder() {
        if (!State.cartCount()) { Toast.show('Add items first', 'error'); return; }
        try {
          const o = await API.post('/orders', { customer_name: document.getElementById('w-name').value || 'Table Guest', customer_phone: '0000000000', total_amount: State.cartTotal() * 1.05, restaurant_id: 1, order_items: State.cart.map(i => ({ menu_item_id: i.id, quantity: i.qty, unit_price: i.price })) });
          State.clearCart(); updateWaiterTotal();
          Toast.show('Order #' + o.id + ' sent to kitchen! 🍽️', 'success');
          Router.navigate('/waiter', true);
        } catch(e) { Toast.show(e.message, 'error'); }
      }
    <\/script>
  `;
});
